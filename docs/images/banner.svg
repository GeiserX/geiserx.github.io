<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00897B"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
  </defs>
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g stroke="white" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>
  <!-- Code brackets with person icon -->
  <g transform="translate(140, 100)" fill="none" stroke="white" stroke-width="2.5" opacity="0.9">
    <!-- Left bracket -->
    <polyline points="-28,-24 -38,0 -28,24"/>
    <!-- Right bracket -->
    <polyline points="28,-24 38,0 28,24"/>
    <!-- Person inside -->
    <circle cx="0" cy="-8" r="8"/>
    <path d="M-14,16 Q-14,2 0,2 Q14,2 14,16"/>
  </g>
  <!-- Title -->
  <text x="450" y="88" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="bold" fill="white">geiserx.github.io</text>
  <!-- Subtitle -->
  <text x="450" y="125" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="white" opacity="0.8">Personal developer portfolio</text>
</svg>
